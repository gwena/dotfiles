# Backend     
# Use GLX (OpenGL) for performance. 
backend = "glx";
vsync = true;
use-damage = true;
log-level = "warn";

# Animations
animations = true;
animation-stiffness = 300.0;
animation-dampening = 25.0;
animation-clamping = true;
animation-mass = 1.0;
animation-for-open-window = "zoom"; 
animation-for-menu-window = "slide-down";
animation-for-transient-window = "slide-up";

# Rules
rules: ({
    match = "window_type = 'tooltip'";
    fade = true;
    shadow = true;
    opacity = 0.9;
    focus = true;
    full-shadow = false;
}, {
    match = "window_type = 'dock' || window_type = 'desktop' || _GTK_FRAME_EXTENTS@";
    shadow = false;
}, {
    # Fix for i3: don't draw shadows on the i3 frames themselves
    match = "class_g = 'i3-frame'";
    shadow = false;
}, {
    # Focused window opacity
    match = "focused";
    opacity = 1.0;
}, {
    # Inactive window opacity (replaces inactive-opacity)
    match = "!focused";
    opacity = 0.95;
}, {
    # Transparent terminals example (replaces opacity-rule)
    match = "class_g = 'Alacritty' || class_g = 'Kitty' || class_g = 'Terminator'";
    opacity = 0.9;
}, {
    # Exclude specific apps from blur/transparency
    match = "class_g = 'Firefox' || class_g = 'vlc' || class_g = 'Chromium'";
    opacity = 1.0;
    blur-background = false;
})

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.7;

# Fading
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

# Blur
blur: {
  method = "dual_kawase";
  strength = 5;
  background = true;
  background-frame = false;
  background-fixed = false;
}

